<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Module Icon Builder</title>
  <style>
    :root{
      --uoe-blue:#041E42; --uoe-purple:#830065; --uoe-teal:#004F71; --uoe-brown:#6D4F47; --uoe-slate:#333F48;
      --bg:#f4f6f8; --panel:#fff; --text:#18202a; --muted:#5c6670; --line:#d9dee5;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:28px 20px 12px;max-width:1100px;margin:auto}
    h1{margin:0 0 8px;font-size:clamp(1.8rem,4vw,2.6rem)}
    h2{margin-top:0}
    p{margin:0;color:var(--muted);line-height:1.45}
    main{max-width:1100px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 420px;gap:22px;align-items:start}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.04)}
    .choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:16px}
    .choice{border:2px solid var(--line);border-radius:16px;background:#fff;padding:18px;text-align:left;cursor:pointer;transition:.15s}
    .choice:hover,.choice.active{border-color:var(--uoe-teal);transform:translateY(-1px)}
    .choice .emoji{font-size:2rem;display:block}.choice strong{display:block;margin-top:8px;font-size:1.05rem}.choice span{font-size:.9rem;color:var(--muted)}
    label{display:block;font-weight:650;margin:16px 0 6px}
    input,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font:inherit;background:#fff}
    input[type="range"]{padding:0}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .small{font-size:.86rem;color:var(--muted);margin-top:6px}
    .hidden{display:none!important}
    .preview-wrap{display:grid;place-items:center;padding:16px}
    .card{--card-colour:var(--uoe-blue);width:360px;height:360px;position:relative;overflow:hidden;background:var(--card-colour);display:grid;place-items:center;box-shadow:0 14px 35px rgba(0,0,0,.15)}
    .card::before,.card::after{content:"";position:absolute;pointer-events:none;display:none}
    .card.style-flare::before{display:block;inset:-30%;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.30),transparent 30%),linear-gradient(135deg,rgba(255,255,255,.16),transparent 45%)}
    .card.style-flare::after{display:block;right:-80px;bottom:-80px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.12)}
    .card.style-solid{background:var(--card-colour)}
    .card.style-split{background:linear-gradient(135deg,var(--card-colour) 0 58%, color-mix(in srgb, var(--card-colour) 74%, white) 58% 100%)}
    .iconBox{position:relative;z-index:2;width:var(--icon-size,64%);height:var(--icon-size,64%);display:grid;place-items:center;color:#fff}
    .iconBox img{max-width:100%;max-height:100%;filter:brightness(0) invert(1)}
    .calendar-text{position:absolute;z-index:3;inset:0;pointer-events:none;color:white;text-align:center;font-weight:850;letter-spacing:-.03em}
    .calendar-text .top{position:absolute;left:16%;right:16%;top:23%;transform:translateY(-50%);font-size:var(--cal-top-size,34px);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .calendar-text .main{position:absolute;left:10%;right:10%;top:64%;transform:translateY(-50%);font-size:var(--cal-main-size,86px);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .buttons{display:flex;gap:10px;margin-top:16px}.btn{border:0;border-radius:12px;padding:12px 14px;font-weight:750;cursor:pointer;background:var(--uoe-teal);color:white}.btn.secondary{background:#e7ebef;color:var(--text)}
    canvas{display:none}
    @supports not (background: color-mix(in srgb, red, white)){.card.style-split{background:linear-gradient(135deg,var(--card-colour) 0 58%,rgba(255,255,255,.18) 58% 100%)}}
    @media(max-width:900px){main{grid-template-columns:1fr}.card{width:min(360px,82vw);height:min(360px,82vw)}.choice-grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <h1>Module Icon Builder</h1>
</header>
<main>
<section class="panel">
  <h2>Create a module image</h2>
  <div class="choice-grid" id="choices">
    <button class="choice active" data-mode="week"><span class="emoji">📅</span><strong>Teaching Week</strong><span>Calendar icon with editable week text.</span></button>
    <button class="choice" data-mode="reading"><span class="emoji">📖</span><strong>Reading Week</strong><span>Independent study / no live teaching.</span></button>
    <button class="choice" data-mode="assessment"><span class="emoji">📝</span><strong>Assessment</strong><span>Assessment or coursework area.</span></button>
    <button class="choice" data-mode="welcome"><span class="emoji">🛣️</span><strong>Welcome</strong><span>Course information / getting started.</span></button>
    <button class="choice" data-mode="other"><span class="emoji">⬆️</span><strong>Other Module</strong><span>Upload your own SVG icon. The Digital Education Unit also has a selection of icons available to choose from.</span></button>
  </div>

  <div id="controls">
    <div id="weekControls">
      <div class="row">
        <div><label for="headerText">Header text</label><input id="headerText" value="Week"></div>
        <div><label for="mainText">Main text</label><input id="mainText" value="1"></div>
      </div>
      <p class="small">Examples: Week / 1, Weeks / 5–6, Month / September. The two pieces of text are placed separately on the calendar.</p>
    </div>

    <div id="uploadControls" class="hidden">
      <label for="uploadSvg">Upload SVG icon only</label>
      <input id="uploadSvg" type="file" accept=".svg,image/svg+xml">
    </div>

    <div class="row">
      <div>
        <label for="colour">Brand colour</label>
        <select id="colour">
          <option value="#830065">Purple</option>
          <option value="#D0006F">Bright pink</option>
          <option value="#D50032">University red</option>
          <option value="#A50034">Burgundy</option>
          <option value="#041E42" selected>University blue</option>
          <option value="#004F71">Muted blue</option>
          <option value="#007288">Bright blue</option>
          <option value="#487A7B">Jade</option>
          <option value="#154734">Dark green</option>
          <option value="#333F48">Spruce grey</option>
          <option value="#6D4F47">Muted brown</option>
        </select>
      </div>
      <div>
        <label for="style">Background style</label>
        <select id="style">
          <option value="flare">Soft flare</option>
          <option value="solid">Solid</option>
          <option value="split">Diagonal split</option>
        </select>
      </div>
    </div>

    <label for="iconSize">Icon size</label>
    <input id="iconSize" type="range" min="45" max="86" value="64">
    <p class="small">Resize the icon within the module image. Calendar text is adjusted separately.</p>
  </div>
</section>

<aside class="panel">
  <h2>Preview</h2>
  <div class="preview-wrap">
    <div class="card style-flare" id="card">
      <div class="iconBox" id="iconBox"><img id="icon" src="icons/calendar.svg" alt=""><div class="calendar-text" id="calText"><div class="top" id="topText">Week</div><div class="main" id="bigText">1</div></div></div>
    </div>
  </div>
  <div class="buttons"><button class="btn" id="download">Download PNG</button><button class="btn secondary" id="reset">Reset</button></div>
</aside>
</main>
<canvas id="canvas" width="500" height="500"></canvas>
<script>
const icons={week:'icons/calendar.svg',reading:'icons/reading-week.svg',assessment:'icons/assignment.svg',welcome:'icons/welcome.svg'};
let mode='week';
const els={
  card:document.getElementById('card'), iconBox:document.getElementById('iconBox'), icon:document.getElementById('icon'),
  calText:document.getElementById('calText'), top:document.getElementById('topText'), big:document.getElementById('bigText'),
  header:document.getElementById('headerText'), main:document.getElementById('mainText'), colour:document.getElementById('colour'),
  style:document.getElementById('style'), iconSize:document.getElementById('iconSize'), weekControls:document.getElementById('weekControls'),
  uploadControls:document.getElementById('uploadControls')
};
function fitFont(text, maxWidth, maxSize, minSize){
  const c=fitFont.canvas || (fitFont.canvas=document.createElement('canvas'));
  const ctx=c.getContext('2d');
  const safeText=(text || ' ').trim() || ' ';
  let size=maxSize;
  while(size>minSize){
    ctx.font=`850 ${size}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
    if(ctx.measureText(safeText).width<=maxWidth) return size;
    size-=1;
  }
  return minSize;
}
function fitCalendarText(){
  const cardSize=360;
  const iconPx=cardSize*(Number(els.iconSize.value)/100);
  const topSize=fitFont(els.header.value, iconPx*.68, iconPx*.13, 10);
  const mainSize=fitFont(els.main.value, iconPx*.78, iconPx*.28, 16);
  els.iconBox.style.setProperty('--cal-top-size', topSize+'px');
  els.iconBox.style.setProperty('--cal-main-size', mainSize+'px');
}
function update(){
  els.card.style.setProperty('--card-colour',els.colour.value);
  els.card.className='card style-'+els.style.value;
  els.iconBox.style.setProperty('--icon-size', els.iconSize.value+'%');
  els.calText.classList.toggle('hidden',mode!=='week');
  els.weekControls.classList.toggle('hidden',mode!=='week');
  els.uploadControls.classList.toggle('hidden',mode!=='other');
  if(mode!=='other') els.icon.src=icons[mode];
  els.top.textContent=els.header.value;
  els.big.textContent=els.main.value;
  fitCalendarText();
}
document.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.choice').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); mode=b.dataset.mode; update();
}));
['input','change'].forEach(ev=>{
  [els.header,els.main,els.colour,els.style,els.iconSize].forEach(el=>el.addEventListener(ev,update));
});
document.getElementById('uploadSvg').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  if(!f.name.toLowerCase().endsWith('.svg')){alert('Please upload an SVG file.'); e.target.value=''; return;}
  els.icon.src=URL.createObjectURL(f); update();
});
document.getElementById('reset').addEventListener('click',()=>{
  mode='week'; els.header.value='Week'; els.main.value='1'; els.colour.value='#041E42'; els.style.value='flare'; els.iconSize.value='64';
  document.querySelectorAll('.choice').forEach(x=>x.classList.toggle('active',x.dataset.mode==='week')); update();
});
function drawBackground(ctx,W,H){
  ctx.fillStyle=els.colour.value;ctx.fillRect(0,0,W,H);
  if(els.style.value==='flare'){
    let g=ctx.createRadialGradient(100,100,20,100,100,260);g.addColorStop(0,'rgba(255,255,255,.30)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,.12)';ctx.beginPath();ctx.arc(470,470,150,0,Math.PI*2);ctx.fill();
  } else if(els.style.value==='split'){
    ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.moveTo(W,0);ctx.lineTo(W,H);ctx.lineTo(260,H);ctx.closePath();ctx.fill();
  }
}
document.getElementById('download').addEventListener('click',async()=>{
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),W=500,H=500;ctx.clearRect(0,0,W,H);drawBackground(ctx,W,H);
  const img=new Image(); img.crossOrigin='anonymous';
  img.onload=()=>{
    const pct=Number(els.iconSize.value)/100; const s=W*pct; const x=(W-s)/2; const y=(H-s)/2;
    ctx.save();ctx.filter='brightness(0) invert(1)';ctx.drawImage(img,x,y,s,s);ctx.restore();
    if(mode==='week'){
      ctx.fillStyle='white';ctx.textAlign='center';ctx.textBaseline='middle';
      const iconPx=s;
      const topSize=fitFont(els.header.value, iconPx*.68, iconPx*.13, 14);
      const mainSize=fitFont(els.main.value, iconPx*.78, iconPx*.28, 20);
      ctx.font=`850 ${topSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;ctx.fillText(els.header.value,x+s*.5,y+s*.23,iconPx*.68);
      ctx.font=`850 ${mainSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;ctx.fillText(els.main.value,x+s*.5,y+s*.64,iconPx*.78);
    }
    const a=document.createElement('a');a.download='module-icon.png';a.href=canvas.toDataURL('image/png');a.click();
  };
  img.src=els.icon.src;
});
update();
</script>
</body>
</html>
